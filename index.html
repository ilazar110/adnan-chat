<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adnan Chat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600&display=swap');

  :root {
    --bg:        #0d0d0d;
    --surface:   #161616;
    --surface2:  #1e1e1e;
    --surface3:  #262626;
    --border:    #2a2a2a;
    --border2:   #333;
    --accent:    #c8a97e;
    --accent-dim:#8a6f4e;
    --text:      #e8e8e8;
    --text2:     #999;
    --text3:     #555;
    --mine-bg:   #1a1610;
    --mine-bdr:  #c8a97e40;
    --radius:    10px;
    --font:      'Vazirmatn', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); font-family: var(--font); color: var(--text); }

  /* ─── Layout ─── */
  .layout { display: flex; height: 100vh; overflow: hidden; }

  /* ─── Sidebar ─── */
  .sidebar {
    width: 260px; flex-shrink: 0;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
  }
  .sidebar-top {
    padding: 20px 18px 14px;
    border-bottom: 1px solid var(--border);
  }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .brand-dot {
    width: 30px; height: 30px; border-radius: 8px;
    background: var(--accent); display: flex; align-items: center; justify-content: center;
  }
  .brand-dot svg { width: 16px; height: 16px; fill: #0d0d0d; }
  .brand-name { font-size: 16px; font-weight: 600; letter-spacing: 0.04em; color: var(--text); }
  .brand-name span { color: var(--accent); }

  .user-card {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface2); border-radius: var(--radius);
    padding: 10px 12px; cursor: pointer;
  }
  .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--surface3); border: 1.5px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 500; color: var(--accent); flex-shrink: 0;
  }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .user-status { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 4px; margin-top: 2px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; flex-shrink: 0; }

  .sidebar-section { padding: 14px 18px 8px; }
  .section-label { font-size: 10px; font-weight: 500; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }

  .room-list { display: flex; flex-direction: column; gap: 2px; }
  .room-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 8px; cursor: pointer;
    font-size: 13px; color: var(--text2); transition: all 0.15s;
  }
  .room-item:hover { background: var(--surface2); color: var(--text); }
  .room-item.active { background: var(--surface3); color: var(--text); }
  .room-item.active .room-hash { color: var(--accent); }
  .room-hash { font-size: 15px; color: var(--text3); }
  .room-badge {
    margin-right: auto; background: var(--accent); color: #0d0d0d;
    font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 10px;
  }

  .sidebar-bottom {
    margin-top: auto;
    padding: 14px 18px;
    border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text3);
    display: flex; align-items: center; gap: 6px;
  }
  .enc-icon { font-size: 13px; }

  /* ─── Main ─── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* ─── Topbar ─── */
  .topbar {
    padding: 0 20px;
    height: 56px; flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex; align-items: center; gap: 12px;
  }
  .topbar-hash { font-size: 18px; color: var(--text3); }
  .topbar-name { font-size: 15px; font-weight: 500; color: var(--text); }
  .topbar-sep { width: 1px; height: 18px; background: var(--border2); }
  .topbar-desc { font-size: 12px; color: var(--text2); }
  .topbar-actions { margin-right: auto; display: flex; gap: 6px; }
  .top-btn {
    width: 32px; height: 32px; border-radius: 8px; border: none;
    background: var(--surface2); color: var(--text2); cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .top-btn:hover { background: var(--surface3); color: var(--text); }
  .top-btn svg { width: 16px; height: 16px; }

  /* ─── Messages ─── */
  .messages {
    flex: 1; overflow-y: auto; padding: 24px 20px;
    display: flex; flex-direction: column; gap: 6px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .day-label {
    text-align: center; font-size: 11px; color: var(--text3);
    display: flex; align-items: center; gap: 10px; margin: 12px 0 6px;
  }
  .day-label::before, .day-label::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .msg-group { display: flex; flex-direction: column; gap: 2px; margin-bottom: 4px; }
  .msg-row { display: flex; gap: 10px; align-items: flex-end; }
  .msg-row.mine { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--surface3); border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500; color: var(--accent);
    flex-shrink: 0; margin-bottom: 2px;
  }
  .msg-avatar.hidden { visibility: hidden; }

  .bubble-wrap { display: flex; flex-direction: column; max-width: 68%; }
  .msg-row.mine .bubble-wrap { align-items: flex-start; }
  .msg-row.other .bubble-wrap { align-items: flex-end; }

  .msg-sender {
    font-size: 11px; color: var(--text3); margin-bottom: 3px;
    padding: 0 4px;
  }
  .msg-row.mine .msg-sender { text-align: right; }

  .bubble {
    padding: 9px 14px; border-radius: 14px;
    font-size: 14px; line-height: 1.6; word-break: break-word;
  }
  .msg-row.other .bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-bottom-right-radius: 4px;
    color: var(--text);
  }
  .msg-row.mine .bubble {
    background: var(--mine-bg);
    border: 1px solid var(--mine-bdr);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .msg-time { font-size: 10px; color: var(--text3); margin-top: 3px; padding: 0 4px; }

  /* file bubble */
  .file-bubble {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 12px;
    background: var(--surface3); border: 1px solid var(--border2);
    cursor: pointer; transition: background 0.15s; max-width: 240px;
  }
  .file-bubble:hover { background: var(--surface2); }
  .file-ico {
    width: 34px; height: 34px; border-radius: 8px;
    background: var(--border); display: flex; align-items: center;
    justify-content: center; flex-shrink: 0;
  }
  .file-ico svg { width: 17px; height: 17px; }
  .file-info { flex: 1; min-width: 0; }
  .file-name { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-size { font-size: 11px; color: var(--text2); margin-top: 2px; }

  /* ─── Input ─── */
  .input-area {
    padding: 12px 20px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  .file-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .chip {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface3); border: 1px solid var(--border2);
    border-radius: 6px; padding: 4px 10px; font-size: 11px; color: var(--text2);
    max-width: 200px;
  }
  .chip span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
  .chip-remove {
    cursor: pointer; color: var(--text3); border: none; background: none;
    display: flex; align-items: center; padding: 0; font-size: 14px;
    transition: color 0.1s;
  }
  .chip-remove:hover { color: #f87171; }

  .input-box {
    display: flex; align-items: flex-end; gap: 8px;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 12px; padding: 8px 10px;
    transition: border-color 0.15s;
  }
  .input-box:focus-within { border-color: var(--accent-dim); }

  .attach-btn {
    width: 34px; height: 34px; border-radius: 8px; border: none;
    background: var(--surface3); color: var(--text2); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s;
  }
  .attach-btn:hover { background: var(--border2); color: var(--text); }
  .attach-btn svg { width: 17px; height: 17px; }

  .msg-input {
    flex: 1; border: none; background: transparent;
    font-family: var(--font); font-size: 14px; color: var(--text);
    resize: none; outline: none; min-height: 34px; max-height: 120px;
    overflow-y: auto; line-height: 1.5; padding: 7px 4px 0;
    text-align: right;
  }
  .msg-input::placeholder { color: var(--text3); }

  .send-btn {
    width: 34px; height: 34px; border-radius: 8px; border: none;
    background: var(--accent); color: #0d0d0d; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity 0.15s;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn svg { width: 17px; height: 17px; }

  /* ─── Toast ─── */
  .toast {
    display: none; position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: #2a1515; border: 1px solid #5a2020; color: #f87171;
    padding: 8px 18px; border-radius: 8px; font-size: 13px; z-index: 100;
    white-space: nowrap;
  }

  /* ─── Login overlay ─── */
  .overlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
  }
  .login-card {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 16px; padding: 36px 32px; width: 320px;
    display: flex; flex-direction: column; gap: 20px;
  }
  .login-brand { display: flex; align-items: center; gap: 10px; }
  .login-dot {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--accent); display: flex; align-items: center; justify-content: center;
  }
  .login-dot svg { width: 18px; height: 18px; fill: #0d0d0d; }
  .login-title { font-size: 18px; font-weight: 600; color: var(--text); }
  .login-title span { color: var(--accent); }
  .login-sub { font-size: 13px; color: var(--text2); margin-top: -10px; }
  .login-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 10px; padding: 12px 14px; font-family: var(--font);
    font-size: 14px; color: var(--text); outline: none; text-align: right;
    transition: border-color 0.15s;
  }
  .login-input:focus { border-color: var(--accent-dim); }
  .login-input::placeholder { color: var(--text3); }
  .login-btn {
    width: 100%; padding: 12px; background: var(--accent); border: none;
    border-radius: 10px; font-family: var(--font); font-size: 14px;
    font-weight: 500; color: #0d0d0d; cursor: pointer; transition: opacity 0.15s;
  }
  .login-btn:hover { opacity: 0.88; }
  .login-enc { font-size: 11px; color: var(--text3); text-align: center; }

  @media (max-width: 640px) {
    .sidebar { display: none; }
  }
</style>
</head>
<body>

<!-- Login -->
<div class="overlay" id="overlay">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-dot">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div class="login-title"><span>Adnan</span> Chat</div>
    </div>
    <div class="login-sub">برای ورود نام خود را وارد کنید</div>
    <input class="login-input" id="nameInput" placeholder="نام شما..." maxlength="20">
    <input class="login-input" id="passInput" type="password" placeholder="رمز عبور (اختیاری)">
    <button class="login-btn" id="loginBtn">ورود به فضا</button>
    <div class="login-enc">🔒 ارتباطات رمزنگاری‌شده</div>
  </div>
</div>

<!-- App -->
<div class="layout" id="app" style="display:none">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="brand">
        <div class="brand-dot">
          <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <div class="brand-name"><span>Adnan</span> Chat</div>
      </div>
      <div class="user-card">
        <div class="avatar" id="sideAvatar">ش</div>
        <div class="user-info">
          <div class="user-name" id="sideUser">شما</div>
          <div class="user-status"><span class="status-dot"></span> آنلاین</div>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-label">کانال‌ها</div>
      <div class="room-list">
        <div class="room-item active">
          <span class="room-hash">#</span> عمومی
          <span class="room-badge" id="unread" style="display:none">1</span>
        </div>
        <div class="room-item"><span class="room-hash">#</span> فایل‌ها</div>
        <div class="room-item"><span class="room-hash">#</span> اعلان‌ها</div>
      </div>
    </div>

    <div class="sidebar-bottom">
      <span class="enc-icon">🔒</span> رمزنگاری فعال
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <span class="topbar-hash">#</span>
      <span class="topbar-name">عمومی</span>
      <span class="topbar-sep"></span>
      <span class="topbar-desc">فضای چت امن Adnan</span>
      <div class="topbar-actions">
        <button class="top-btn" title="جستجو">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
        <button class="top-btn" title="اعضا">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </button>
      </div>
    </div>

    <div class="messages" id="msgs">
      <div class="day-label">امروز</div>
      <div class="msg-group">
        <div class="msg-row other">
          <div class="msg-avatar">A</div>
          <div class="bubble-wrap">
            <div class="msg-sender">Adnan Bot</div>
            <div class="bubble">به فضای چت امن Adnan خوش آمدید! پیام‌ها و فایل‌های شما رمزنگاری‌شده‌اند.</div>
            <div class="msg-time" id="welcomeTime"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="file-chips" id="chips"></div>
      <div class="input-box">
        <button class="attach-btn" id="attachBtn" title="ارسال فایل">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <input type="file" id="fileInput" multiple accept="image/*,.pdf,.txt,.html,.doc,.docx,.zip,.rar" style="display:none">
        <textarea class="msg-input" id="msgInput" placeholder="پیامی بنویسید..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MAX = 6 * 1024 * 1024;
let myName = '', myInitial = '', pendingFiles = [];

// time
function timeStr() {
  return new Date().toLocaleTimeString('fa-IR', {hour:'2-digit', minute:'2-digit'});
}
document.getElementById('welcomeTime').textContent = timeStr();

// login
document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('passInput').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('nameInput').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('passInput').focus(); });

function doLogin() {
  const n = document.getElementById('nameInput').value.trim();
  if (!n) { shake(document.getElementById('nameInput')); return; }
  myName = n;
  myInitial = n[0].toUpperCase();
  document.getElementById('sideAvatar').textContent = myInitial;
  document.getElementById('sideUser').textContent = myName;
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('msgInput').focus();
  addSystemMsg(`${myName} وارد شد`);
}

function shake(el) {
  el.style.animation = 'none';
  el.style.borderColor = '#f87171';
  setTimeout(() => el.style.borderColor = '', 1000);
}

// toast
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.display = 'none', 3000);
}

// system msg
function addSystemMsg(txt) {
  const el = document.createElement('div');
  el.className = 'day-label';
  el.style.fontSize = '11px';
  el.textContent = txt;
  document.getElementById('msgs').appendChild(el);
  scrollBottom();
}

// file icon
function fileIco(name) {
  const ext = (name.split('.').pop()||'').toLowerCase();
  if (['jpg','jpeg','png','gif','webp','svg'].includes(ext)) return `<svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`;
  if (ext==='pdf') return `<svg viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
  return `<svg viewBox="0 0 24 24" fill="none" stroke="var(--text2)" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
}

function fmtSize(b) {
  if (b<1024) return b+' B';
  if (b<1024*1024) return (b/1024).toFixed(1)+' KB';
  return (b/1024/1024).toFixed(1)+' MB';
}

// chips
function renderChips() {
  const c = document.getElementById('chips');
  c.innerHTML = '';
  pendingFiles.forEach((f, i) => {
    const d = document.createElement('div');
    d.className = 'chip';
    d.innerHTML = `<span title="${f.name}">${f.name}</span><button class="chip-remove" data-i="${i}">×</button>`;
    c.appendChild(d);
  });
  c.querySelectorAll('.chip-remove').forEach(btn => {
    btn.addEventListener('click', () => { pendingFiles.splice(+btn.dataset.i, 1); renderChips(); });
  });
}

// add message
function addMsg(text, files, isMine) {
  const msgs = document.getElementById('msgs');
  const g = document.createElement('div');
  g.className = 'msg-group';

  const row = document.createElement('div');
  row.className = 'msg-row ' + (isMine ? 'mine' : 'other');

  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = isMine ? myInitial : 'A';

  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap';

  if (!isMine) {
    const snd = document.createElement('div');
    snd.className = 'msg-sender';
    snd.textContent = 'کاربر دیگر';
    wrap.appendChild(snd);
  }

  if (text.trim()) {
    const b = document.createElement('div');
    b.className = 'bubble';
    b.textContent = text;
    wrap.appendChild(b);
  }

  files.forEach(f => {
    const fb = document.createElement('div');
    fb.className = 'file-bubble';
    fb.innerHTML = `<div class="file-ico">${fileIco(f.name)}</div><div class="file-info"><div class="file-name">${f.name}</div><div class="file-size">${fmtSize(f.size)}</div></div>`;
    wrap.appendChild(fb);
  });

  const tm = document.createElement('div');
  tm.className = 'msg-time';
  tm.textContent = timeStr();
  wrap.appendChild(tm);

  row.appendChild(av);
  row.appendChild(wrap);
  g.appendChild(row);
  msgs.appendChild(g);
  scrollBottom();
}

function scrollBottom() {
  const m = document.getElementById('msgs');
  m.scrollTop = m.scrollHeight;
}

// send
function send() {
  const txt = document.getElementById('msgInput').value.trim();
  if (!txt && pendingFiles.length === 0) return;
  addMsg(txt, pendingFiles, true);
  document.getElementById('msgInput').value = '';
  const sentFiles = [...pendingFiles];
  pendingFiles = [];
  renderChips();
  document.getElementById('msgInput').style.height = 'auto';

  // simulate reply
  setTimeout(() => {
    const replies = ['دریافت شد، ممنون!','فایل رو دیدم.','باشه، بررسی می‌کنم.','خوب، ادامه بده.'];
    addMsg(replies[Math.floor(Math.random()*replies.length)], [], false);
  }, 800 + Math.random()*600);
}

document.getElementById('sendBtn').addEventListener('click', send);
document.getElementById('msgInput').addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
document.getElementById('msgInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// attach
document.getElementById('attachBtn').addEventListener('click', () => document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', function() {
  Array.from(this.files).forEach(f => {
    if (f.size > MAX) { showToast(`فایل "${f.name}" بیشتر از ۶ مگابایت است`); return; }
    pendingFiles.push(f);
  });
  this.value = '';
  renderChips();
});

// drag & drop
document.getElementById('msgInput').addEventListener('dragover', e => e.preventDefault());
document.getElementById('msgInput').addEventListener('drop', e => {
  e.preventDefault();
  Array.from(e.dataTransfer.files).forEach(f => {
    if (f.size > MAX) { showToast(`فایل "${f.name}" بیشتر از ۶ مگابایت است`); return; }
    pendingFiles.push(f);
  });
  renderChips();
});
</script>
</body>
</html>
